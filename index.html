<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Women's Day Rasmalai</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#ffd6e7,#ffffff);
text-align:center;
}

h1{
position:absolute;
top:10px;
width:100%;
}

#sky{
position:relative;
width:100vw;
height:100vh;
}

.balloon{

width:80px;
height:100px;
border-radius:50%;
position:absolute;
cursor:pointer;

background:radial-gradient(circle at 30% 30%,#ff9bb3,#ff4d6d);

animation:float 8s ease-in-out infinite;

}

.balloon:nth-child(even){
background:radial-gradient(circle at 30% 30%,#ffd166,#ff9f1c);
}

/* balloon tail */

.balloon:after{
content:"";
width:2px;
height:45px;
background:#555;
position:absolute;
bottom:-45px;
left:50%;
}

/* floating movement */

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}

}

/* popup */

#popup{

display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
z-index:5;

}

#popup img{
width:240px;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Pop all the balloons 🎈</h1>

<div id="sky"></div>

<div id="popup">

<img id="img">
<p id="msg"></p>

<button onclick="closePop()">Close</button>

</div>

<script>

const sky=document.getElementById("sky")

let opened=0

const messages=[

"My Little Rasmalai ✨🫀😍",
"Cutiee woman holding less cute her flower ✨🎀",
"Can I get some yoga lessons ma'am ji 😄🧘🏻‍♂️",
"Bestest moment of my life 🤌🏻✨🎀",
"My Snow Woman ✨😘",
"My cutie panda 🐼 24/7 sleep mode",
"My Sanskari Women 🌸✨🛐",
"Koi itna khubsurat kaise ho sakta hai 🧿",
"My sweet Green Apple 🍏😋✨"

]

/* create balloons randomly */

for(let i=1;i<=9;i++){

let b=document.createElement("div")

b.className="balloon"

b.style.left=Math.random()*90+"vw"
b.style.top=Math.random()*80+"vh"

b.onclick=function(){show(i,b)}

sky.appendChild(b)

}

function show(i,balloon){

opened++

balloon.style.visibility="hidden"

document.getElementById("popup").style.display="block"
document.getElementById("img").src=i+".jpg"
document.getElementById("msg").innerText=messages[i-1]

if(opened===9){

setTimeout(finalPage,1500)

}

}

function closePop(){

document.getElementById("popup").style.display="none"

}

function finalPage(){

document.body.innerHTML=`

<h1>Happy Women's Day My Rasmalai ✨</h1>

<div style="max-width:500px;margin:auto;font-size:18px;line-height:1.6">

Happy Women's Day to My Smart Beautiful Sexy Strong Women 🎀✨🫶🏻🌻🪷🌸👑👑<br><br>

Aaj ka din bas ek reminder hai ki aap kitni amazing ho but sach toh yeh hai ki
aapko celebrate karne ke liye ek din kaafi nahi hai.
For me every day is My Women's Day ❤️👑✨🎀<br><br>

Sach bolo toh bacha aapke aane ke baad meri life kaafi zyada beautiful ho gayi hai.
Pehle life normal thi par ab usme ek alag si happiness aa gayi hai.<br><br>

Aapki smile, aapki baatein aur aapka caring nature meri life ko aur pyaara bana dete hain 🥹🎀🫶🏻<br><br>

Bacha aapke saath simple moments bhi special feel hote hain 🫂🫀❤️‍🔥✨🧿<br><br>

Aap meri life mein ho uske liye main Bhagwan ji ka bohot shukraguzaar hoon 🙏🏻🛐

</div>

`

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Women's Day Rasmalai</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#ffe6f0,#ffffff);
text-align:center;
}

h1{
margin-top:20px;
}

.sky{
position:relative;
width:100%;
height:80vh;
}

/* balloons */

.balloon{
width:80px;
height:100px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 12s linear infinite;
}

.balloon:nth-child(odd){
background:radial-gradient(circle at 30% 30%,#ff8fab,#ff4d6d);
}

.balloon:nth-child(even){
background:radial-gradient(circle at 30% 30%,#ffd166,#ff9f1c);
}

/* tail */

.balloon:after{
content:"";
width:2px;
height:40px;
background:#555;
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* popup */

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
z-index:10;
}

.popup img{
width:230px;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
}

/* stars */

.star{
position:fixed;
color:gold;
font-size:20px;
animation:starpop 1s forwards;
}

@keyframes starpop{
0%{transform:scale(0)}
100%{transform:scale(1.5) translateY(-80px);opacity:0}
}

</style>
</head>

<body>

<h1>Happy Women's Day My Rasmalai ✨</h1>
<p>Pop the floating balloons 🎈</p>

<div class="sky" id="sky"></div>

<div id="popup" class="popup">
<img id="img">
<p id="msg"></p>
<button onclick="closePop()">Close</button>
</div>

<script>

let opened=0;

const messages=[
"My Little Rasmalai ✨🫀😍",
"Cutiee woman holding less cute her flower ✨🎀",
"Can I get some yoga lessons ma'am ji 😄🧘🏻‍♂️",
"Bestest moment of my life 🤌🏻✨🎀",
"My Snow Woman ✨😘",
"My cutie panda 🐼 24/7 sleep mode",
"My Sanskari Women 🌸✨🛐",
"Koi itna khubsurat 24/7 kaise ho sakta hai 🧿",
"My sweet Green Apple 🍏😋✨"
];

const sky=document.getElementById("sky");

/* create balloons */

for(let i=1;i<=9;i++){

let b=document.createElement("div");
b.className="balloon";

b.style.left=Math.random()*90+"%";
b.style.animationDuration=(10+Math.random()*10)+"s";

b.onclick=function(){show(i,b)};

sky.appendChild(b);

}

/* balloon click */

function show(i,el){

opened++;

el.remove();

document.getElementById("popup").style.display="block";
document.getElementById("img").src=i+".jpg";
document.getElementById("msg").innerText=messages[i-1];

/* star burst */

for(let k=0;k<8;k++){

let s=document.createElement("div");

s.className="star";
s.innerHTML="⭐";

s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

}

if(opened==9){

setTimeout(finalPage,1500);

}

}

function closePop(){
document.getElementById("popup").style.display="none";
}

/* final page */

function finalPage(){

document.body.innerHTML=`

<h1>Happy Women's Day My Rasmalai ✨</h1>

<div style="max-width:500px;margin:auto;font-size:18px;line-height:1.6">

Happy Women's Day to My Smart Beautiful Sexy Strong Women 🎀✨🫶🏻🌻🪷🌸👑👑<br><br>

Aaj ka din bas ek reminder hai ki aap kitni amazing ho but sach toh yeh hai ki aapko celebrate karne ke liye ek din kaafi nahi hai.  
For me every day is My Women's Day ❤️👑✨🎀<br><br>

Sach bolo toh bacha aapke aane ke baad meri life kaafi zyada beautiful ho gayi hai.  
Pehle life normal thi par ab usme ek alag si happiness aa gayi hai.<br><br>

Aapki smile, aapki baatein aur aapka caring nature meri life ko aur pyaara bana dete hain 🥹🎀🫶🏻<br><br>

Bacha aapke saath simple moments bhi special feel hote hain 🫂🫀❤️‍🔥✨🧿<br><br>

Aap meri life mein ho uske liye main Bhagwan ji ka bohot shukraguzaar hoon 🙏🏻🛐

</div>

`;

}

</script>

</body>
</html>

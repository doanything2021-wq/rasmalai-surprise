<!DOCTYPE html>
<html>
<head>
<title>Happy Women's Day Rasmalai</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ffe6f0,#ffffff);
}

.balloon{
width:90px;
height:110px;
border-radius:50%;
background:#ff4d6d;
display:inline-block;
margin:20px;
cursor:pointer;
position:relative;
}

.balloon:after{
content:"";
width:2px;
height:40px;
background:#555;
position:absolute;
bottom:-40px;
left:50%;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
}

.popup img{
width:220px;
}
</style>
</head>

<body>

<h1>Happy Women's Day My Rasmalai ✨</h1>
<p>Pop all the balloons 🎈</p>

<div onclick="show(1)" class="balloon"></div>
<div onclick="show(2)" class="balloon"></div>
<div onclick="show(3)" class="balloon"></div>
<div onclick="show(4)" class="balloon"></div>
<div onclick="show(5)" class="balloon"></div>
<div onclick="show(6)" class="balloon"></div>
<div onclick="show(7)" class="balloon"></div>
<div onclick="show(8)" class="balloon"></div>
<div onclick="show(9)" class="balloon"></div>

<div id="popup" class="popup">
<img id="img">
<p id="msg"></p>
<button onclick="closePop()">Close</button>
</div>

<script>

<script>

"My Sanskari Women 🌸✨",
"Koi itna khubsurat kaise ho sakta hai 🧿",
"My sweet Green Apple 🍏😋✨"
];

function show(i){

opened++;

document.getElementById("popup").style.display="block";
document.getElementById("img").src=i+".jpg";
document.getElementById("msg").innerText=text[i-1];

if(opened==9){

setTimeout(finalMessage,1500);

}

}

function closePop(){

document.getElementById("popup").style.display="none";

}

function finalMessage(){

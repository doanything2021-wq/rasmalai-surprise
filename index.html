<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Women's Day Rasmalai</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ffe6f0,#ffffff);
margin:0;
padding:20px;
}

h1{
margin-top:20px;
}

.container{
margin-top:40px;
}

.balloon{
width:90px;
height:110px;
border-radius:50%;
display:inline-block;
margin:20px;
cursor:pointer;
position:relative;
background:#ff4d6d;
}

.balloon:nth-child(even){
background:#ff9f1c;
}

.balloon:after{
content:"";
width:2px;
height:40px;
background:#444;
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.popup img{
width:230px;
border-radius:8px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<h1>Happy Women's Day My Rasmalai ✨</h1>
<p>Pop all the balloons 🎈</p>

<div class="container">

<div class="balloon" onclick="show(1)"></div>
<div class="balloon" onclick="show(2)"></div>
<div class="balloon" onclick="show(3)"></div>
<div class="balloon" onclick="show(4)"></div>
<div class="balloon" onclick="show(5)"></div>
<div class="balloon" onclick="show(6)"></div>
<div class="balloon" onclick="show(7)"></div>
<div class="balloon" onclick="show(8)"></div>
<div class="balloon" onclick="show(9)"></div>

</div>

<div id="popup" class="popup">

<img id="img">
<p id="msg"></p>
<button onclick="closePop()">Close</button>

</div>

<script>

let opened = 0;

const messages = [

"My Little Rasmalai ✨🫀😍",
"Cutiee woman holding less cute her flower ✨🎀",
"Can I get some yoga lessons ma'am ji 😄🧘🏻‍♂️",
"Bestest moment of my life 🤌🏻✨🎀",
"My Snow Woman ✨😘",
"My cutie panda 🐼 24/7 sleep mode",
"My Sanskari Women 🌸✨🛐",
"Koi itna khubsurat 24/7 kaise ho sakta hai 🧿",
"My sweet Green Apple 🍏😋✨"

];

function show(i){

opened++;

document.getElementById("popup").style.display="block";
document.getElementById("img").src=i+".jpg";
document.getElementById("msg").innerText=messages[i-1];

if(opened===9){

setTimeout(finalPage,1200);

}

}

function closePop(){

document.getElementById("popup").style.display="none";

}

function finalPage(){

document.body.innerHTML = `

<div style="max-width:500px;margin:auto;font-size:18px;line-height:1.6">

Happy Women's Day to My Smart Beautiful Sexy Strong Women 🎀✨🫶🏻🌻🪷🌸👑👑<br><br>

Aaj ka din bas ek reminder hai ki aap kitni amazing ho but sach toh yeh hai ki aapko celebrate karne ke liye ek din kaafi nahi hai.  
For me every day is My Women's Day ❤️👑✨🎀<br><br>

Sach bolo toh bacha aapke aane ke baad meri life kaafi zyada beautiful ho gayi hai.

Aapki smile, aapki baatein aur aapka caring nature meri life ko aur pyaara bana dete hain 🥹🎀🫶🏻<br><br>

Bacha aapke saath simple moments bhi special feel hote hain 🫂🫀❤️‍🔥✨🧿<br><br>

Aap meri life mein ho uske liye main Bhagwan ji ka bohot shukraguzaar hoon 🙏🏻🛐

</div>
`;

}

</script>

</body>
</html>

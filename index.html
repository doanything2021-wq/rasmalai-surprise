<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Women's Day Rasmalai</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#ffd6e7,#ffffff);
text-align:center;
}

h1{
position:absolute;
top:10px;
width:100%;
}

#sky{
position:relative;
width:100vw;
height:100vh;
}

.balloon{
width:80px;
height:100px;
border-radius:50%;
position:absolute;
cursor:pointer;
background:radial-gradient(circle at 30% 30%,#ff9bb3,#ff4d6d);
animation:float 7s ease-in-out infinite;
}

.balloon:nth-child(even){
background:radial-gradient(circle at 30% 30%,#ffd166,#ff9f1c);
}

.balloon:after{
content:"";
width:2px;
height:45px;
background:#555;
position:absolute;
bottom:-45px;
left:50%;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* popup */

#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
z-index:5;
}

#popup img{
width:240px;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#ff4d6d;
color:white;
border-radius:6px;
cursor:pointer;
}

/* star burst */

.star{
position:absolute;
color:gold;
font-size:20px;
animation:burst 0.7s ease-out forwards;
}

@keyframes burst{
0%{opacity:1;transform:scale(0)}
100%{opacity:0;transform:scale(2) translateY(-30px)}
}

/* typing text */

#typing{
font-size:32px;
font-weight:bold;
margin-top:120px;
color:#ff2e63;
}

</style>
</head>

<body>

<h1>Pop all the balloons рҹҺҲ</h1>

<div id="sky"></div>

<div id="popup">
<img id="img">
<p id="msg"></p>
<button onclick="closePop()">Close</button>
</div>

<script>

const sky=document.getElementById("sky")
let opened=0

const messages=[

"My Little Rasmalai вңЁрҹ«ҖрҹҳҚ",
"Cutiee women holding less cute her flower вңЁрҹҺҖ",
"Can I get some yoga lessons ma'am ji рҹҳ„рҹ§ҳрҹҸ»вҖҚвҷӮпёҸ",
"Bestest moment of my life рҹӨҢрҹҸ»вңЁрҹҺҖ",
"My Snow women вңЁрҹҳҳ",
"My cutie Panda рҹҗјвңЁрҹҺҖрҹҳҳ",
"My Sanskari Women рҹҢёвңЁрҹӣҗ",
"Itni Khubsurat koi kaise dekh sakta hai 24/7 рҹ§ҝвңЁ",
"My sweet Green Apple рҹҚҸрҹҳӢвңЁ"

/* create balloons */

for(let i=1;i<=9;i++){

let b=document.createElement("div")
b.className="balloon"

b.style.left=Math.random()*90+"vw"
b.style.top=Math.random()*80+"vh"

b.onclick=function(){show(i,b)}

sky.appendChild(b)

}

function starBurst(x,y){

for(let i=0;i<6;i++){

let s=document.createElement("div")
s.className="star"
s.innerHTML="вӯҗ"

s.style.left=x+"px"
s.style.top=y+"px"

document.body.appendChild(s)

setTimeout(()=>s.remove(),700)

}

}

function show(i,balloon){

opened++

let rect=balloon.getBoundingClientRect()
starBurst(rect.left,rect.top)

balloon.style.visibility="hidden"

document.getElementById("popup").style.display="block"
document.getElementById("img").src=i+".jpg"
document.getElementById("msg").innerText=messages[i-1]

if(opened===9){

setTimeout(showTyping,1500)

}

}

function closePop(){

document.getElementById("popup").style.display="none"

}

function showTyping(){

document.body.innerHTML=`<div id="typing"></div>`

let text="I Love You Hetal вқӨпёҸ"
let i=0

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(type,100)

}else{

setTimeout(finalPage,1200)

}

}

type()

}

function finalPage(){

document.body.innerHTML=`

<h1>Happy Women's Day, My Rasmalai вңЁ</h1>

Bacha Aapke saath simple moments bhi special feel hote hainрҹ«Ӯрҹ«ҖвқӨпёҸвҖҚрҹ”ҘвңЁрҹ§ҝ<br><br>

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div")
c.style.position="fixed"
c.style.width="6px"
c.style.height="6px"
c.style.background=["#ff4d6d","#ffd166","#2ec4b6"][Math.floor(Math.random()*3)]
c.style.left=Math.random()*100+"vw"
c.style.top="-10px"

</script>

</body>
</html>
